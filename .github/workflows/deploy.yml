name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies 📦
        run: npm install

      - name: Build 🏗️
        run: npm run build
        env:
          VITE_REPO_NAME: ${{ github.event.repository.name }}

      - name: Debug Output 📂
        run: |
          echo "Base path set for repo: ${{ github.event.repository.name }}"
          ls -R dist

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
